[package]
name = "dalloc"
description = "A disk allocator that uses memory mapping as a page cache"
version = "0.0.1"
edition = "2024"
# The page_size module is generated by the build script
exclude = ["src/page_size.rs"]

[dependencies]
memmap2 = "0.9.10"
page_size = "0.6.0"
parking_lot = "0.12.5"
bytemuck = { version = "1.25.0", features = ["derive", "min_const_generics"] }

[dev-dependencies]
rayon = "1.11.0"
tempfile = "3.27.0"

[build-dependencies]
page_size = "0.6.0"
